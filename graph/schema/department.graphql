type Department {
  id: Uint64!
  tenantId: Uint64!
  name: String!
  code: String
  description: String
  status: String!
}

input CreateDepartment {
  name: String!
  code: String
  description: String
}

extend type Query {
  getDepartments: [Department!]! 
}

extend type Mutation {
  createDepartment(input: CreateDepartment!): Department!
}